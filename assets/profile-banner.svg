<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Olivier Poirier</title>
  <desc id="desc">Développeur informatique au Québec, spécialisé en web, backend, bots et audio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="280" x2="1040" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .fade-up { opacity: 0; animation: fadeUp 850ms ease-out forwards; }
      .delay-1 { animation-delay: 120ms; }
      .delay-2 { animation-delay: 240ms; }
      .delay-3 { animation-delay: 420ms; }
      .draw-line {
        stroke-dasharray: 1050;
        stroke-dashoffset: 1050;
        animation: drawLine 1500ms ease-out 300ms forwards;
      }
      .float { animation: float 4.5s ease-in-out infinite; transform-origin: 987px 182px; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.08); }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
  <circle class="pulse" cx="980" cy="178" r="118" fill="url(#glow)"/>
  <path d="M0 260C170 222 253 296 407 246C572 193 643 70 835 94C1000 115 1058 244 1200 205V360H0V260Z" fill="#020617" opacity="0.18"/>
  <path class="draw-line" d="M108 278C298 189 421 312 612 204C799 98 915 86 1092 134" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.95"/>

  <g class="fade-up delay-1" filter="url(#shadow)">
    <rect x="76" y="66" width="1048" height="228" rx="28" fill="#020617" opacity="0.48"/>
    <rect x="76.5" y="66.5" width="1047" height="227" rx="27.5" stroke="#FFFFFF" stroke-opacity="0.18"/>
  </g>

  <text class="fade-up delay-2" x="116" y="146" fill="#E0F2FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="3">
    DEVELOPPEUR INFORMATIQUE
  </text>
  <text class="fade-up delay-2" x="116" y="207" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="66" font-weight="800">
    Olivier Poirier
  </text>
  <text class="fade-up delay-3" x="118" y="253" fill="#D1FAE5" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="500">
    Web apps • Backend • Bots • Audio tooling
  </text>

  <g class="float fade-up delay-3" transform="translate(910 105)">
    <rect x="0" y="0" width="154" height="154" rx="28" fill="#FFFFFF" opacity="0.12"/>
    <path d="M38 102V52L77 30L116 52V102L77 124L38 102Z" stroke="#FFFFFF" stroke-width="9" stroke-linejoin="round"/>
    <path d="M77 30V78L116 102" stroke="#38BDF8" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M77 78L38 102" stroke="#22C55E" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="77" cy="78" r="10" fill="#F59E0B">
      <animate attributeName="r" values="9;13;9" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
